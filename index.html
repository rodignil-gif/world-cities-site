<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cestování po městech světa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #e3f2fd; }
        h1 { color: #1976d2; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        ul { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cestování po městech světa</h1>
        <p>Objevte úžasná města planety.</p>
        <h2>Populární města:</h2>
        <ul>
            <li>Paříž, Francie</li>
            <li>Tokio, Japonsko</li>
            <li>New York, USA</li>
            <li>Řím, Itálie</li>
        </ul>
        <p>Každé město má svou jedinečnou atmosféru a památky.</p>
    </div>
</body>
</html>
